
<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Face Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
        'Segoe UI',
        sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(
            135deg,
            #0f172a,
            #111827,
            #172554
        );

    overflow:hidden;
}

.bg-glow{

    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(59,130,246,.35),
            transparent 70%
        );

    filter:blur(50px);

    animation:
        floatGlow
        6s infinite ease-in-out;
}

.bg-glow.one{
    top:-120px;
    left:-120px;
}

.bg-glow.two{
    bottom:-120px;
    right:-120px;
}

@keyframes floatGlow{

    0%,100%{
        transform:
            translateY(0);
    }

    50%{
        transform:
            translateY(-25px);
    }
}

.login-card{

    position:relative;
    width:480px;
    padding:30px;

    border-radius:28px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:
        blur(20px);

    border:
        1px solid rgba(
            255,255,255,.15
        );

    box-shadow:
        0 25px 50px
        rgba(0,0,0,.35);

    text-align:center;
}

.login-card h1{

    color:white;
    font-size:42px;
    margin-bottom:10px;
}

.login-card p{

    color:#cbd5e1;
    margin-bottom:25px;
    font-size:18px;
}

.camera-box{

    position:relative;

    width:100%;
    max-width:400px;

    margin:auto;

    border-radius:26px;
    overflow:hidden;

    border:
        2px solid
        rgba(59,130,246,.7);

    box-shadow:
        0 0 25px
        rgba(59,130,246,.25);
}

video{

    width:100%;
    display:block;

    transform:
        scaleX(-1);
}
#meshCanvas{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    pointer-events:none;

    transform:
        scaleX(-1);

    z-index:10;
}

.overlay{

    position:absolute;
    inset:0;
    pointer-events:none;
}

.scan-frame{

    position:absolute;

    width:62%;
    height:72%;

    top:14%;
    left:19%;

    border:
        3px solid
        #38bdf8;

    border-radius:24px;

    box-shadow:
        0 0 25px
        rgba(56,189,248,.6);

    animation:
        pulseFrame
        2s infinite;
}

@keyframes pulseFrame{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }
}




.status{

    margin-top:25px;
    color:#e2e8f0;
    font-size:20px;
    font-weight:600;
}

.success{

    color:#4ade80;
}

.error{

    color:#f87171;
}
.corner{

    position:absolute;

    width:50px;
    height:50px;

    border:4px solid #00ff88;

    z-index:12;

    filter:
        drop-shadow(
            0 0 8px #00ff88
        );
}

.corner.tl{
    top:15px;
    left:15px;
    border-right:none;
    border-bottom:none;
}

.corner.tr{
    top:15px;
    right:15px;
    border-left:none;
    border-bottom:none;
}

.corner.bl{
    bottom:15px;
    left:15px;
    border-right:none;
    border-top:none;
}

.corner.br{
    bottom:15px;
    right:15px;
    border-left:none;
    border-top:none;
}

.loading-dot::after{

    content:'';
    animation:dots 1s infinite;
}

@keyframes dots{

    0%{
        content:'';
    }

    33%{
        content:'.';
    }

    66%{
        content:'..';
    }

    100%{
        content:'...';
    }
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

</head>

<body>

<div class="bg-glow one"></div>
<div class="bg-glow two"></div>

<div class="login-card">

    <h1>Face Login</h1>

    <p>
        Align your face inside
        the scanning frame
    </p>

    <div class="camera-box">

        <video
            id="video"
            autoplay
            playsinline
        ></video>
        <canvas
            id="meshCanvas">
        </canvas>

        <div class="overlay">

            <div class="scan-frame"></div>

            

            <div class="corner tl"></div>

            <div class="corner tr"></div>

            <div class="corner bl"></div>

            <div class="corner br"></div>

        </div>
    </div>

    <div
        class="status"
        id="status"
    >
        Starting camera...
    </div>

</div>

<canvas
    id="canvas"
    style="display:none;"
></canvas>

<script>

const CLIENT_ID =
    "19557";

const video =
    document.getElementById(
        "video"
    );

const canvas =
    document.getElementById(
        "canvas"
    );

const statusText =
    document.getElementById(
        "status"
    );

let isChecking =
    false;

const meshCanvas =
    document.getElementById(
        "meshCanvas"
    );

const meshCtx =
    meshCanvas.getContext(
        "2d"
    );

const faceMesh =
    new FaceMesh({
        locateFile:
        (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

faceMesh.setOptions({

    maxNumFaces:1,

    refineLandmarks:true,

    minDetectionConfidence:0.5,

    minTrackingConfidence:0.5
});

faceMesh.onResults(
    function(results){

        meshCanvas.width =
            video.videoWidth;

        meshCanvas.height =
            video.videoHeight;

        meshCtx.clearRect(
            0,
            0,
            meshCanvas.width,
            meshCanvas.height
        );

        if(
            !results.multiFaceLandmarks
        ){
            return;
        }
        console.log(
            "FACE DETECTED"
        );
        for(
            const landmarks
            of results.multiFaceLandmarks
        ){

            window.drawConnectors(
                meshCtx,
                landmarks,
                FACEMESH_TESSELATION,
                {
                    color:"#00ff88",
                    lineWidth:1
                }
            );
        }
    }
);



navigator
.mediaDevices
.getUserMedia({
    video:true
})
.then(function(stream){

    video.srcObject =
        stream;
    const camera =
    new Camera(
        video,
        {
            onFrame:
            async () => {

                await faceMesh.send({
                    image:video
                });

            },
            width:640,
            height:480
        }
    );

camera.start();

    statusText.innerHTML =
        "Scanning Face" +
        '<span class="loading-dot"></span>';

    setInterval(
        checkFaceLogin,
        1500
    );
})
.catch(function(error){

    statusText.innerHTML =
        "Camera access denied";

    statusText.classList
    .add("error");

    console.log(error);
});

async function captureFrame(
    filename
){

    const context =
        canvas.getContext(
            "2d"
        );

    canvas.width =
        video.videoWidth;

    canvas.height =
        video.videoHeight;

    context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    return new Promise(
        function(resolve){

        canvas.toBlob(
            function(blob){

                resolve({
                    blob,
                    filename
                });

            },
            "image/jpeg",
            0.9
        );

    });
}

async function checkFaceLogin(){

    if(isChecking){
        return;
    }

    isChecking =
        true;

    try{

        const frame1 =
            await captureFrame(
                "face1.jpg"
            );

        await new Promise(
            r => setTimeout(
                r,
                150
            )
        );

        const frame2 =
            await captureFrame(
                "face2.jpg"
            );

        const formData =
            new FormData();

        formData.append(
            "clientid",
            CLIENT_ID
        );

        formData.append(
            "photos",
            frame1.blob,
            frame1.filename
        );

        formData.append(
            "photos",
            frame2.blob,
            frame2.filename
        );

        const response =
            await fetch(
                "/authenticate",
                {
                    method:"POST",
                    body:formData
                }
            );

        const data =
            await response.json();

        statusText.innerText =
            data.message;

        if(
            data.success
        ){

            statusText.classList
            .add(
                "success"
            );

            localStorage.setItem(
                "loggedInUser",
                data.username
            );

            localStorage.setItem(
                "loggedInUserId",
                data.userid
            );

            setTimeout(
                function(){

                    window.location.href =
                        "welcome.html";

                },
                1000
            );
        }

    }catch(error){

        statusText.innerText =
            "Server Error";

        statusText.classList
        .add("error");

        console.log(error);

    }finally{

        isChecking =
            false;
    }
}

</script>

</body>
</html>
