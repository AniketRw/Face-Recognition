
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Face Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
        'Segoe UI',
        sans-serif;
}


body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            135deg,
            #0f172a,
            #111827,
            #172554
        );

    overflow-y:auto;
    padding:30px 0;
}



.bg-glow{

    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(59,130,246,.25),
            transparent 70%
        );

    filter:blur(50px);

    animation:
        floatGlow
        6s infinite ease-in-out;
}

.bg-glow.one{
    top:-120px;
    left:-120px;
}

.bg-glow.two{
    bottom:-120px;
    right:-120px;
}

@keyframes floatGlow{

    0%,100%{
        transform:
            translateY(0);
    }

    50%{
        transform:
            translateY(-25px);
    }
}


.card{

    width:500px;

    padding:28px;

    border-radius:30px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:
        blur(20px);

    border:
        1px solid rgba(
            255,255,255,.15
        );

    box-shadow:
        0 25px 50px
        rgba(0,0,0,.35);

    text-align:center;
}


.card h1{

    color:white;

    font-size:42px;

    margin-bottom:12px;
}

.card p{

    color:#cbd5e1;

    margin-bottom:25px;
}

.input-box{

    width:100%;

    margin-bottom:18px;
}

.input-box input{

    width:100%;

    padding:16px 18px;

    border-radius:16px;

    border:none;

    outline:none;

    background:
        rgba(255,255,255,.08);

    color:white;

    font-size:18px;

    border:
        1px solid rgba(
            255,255,255,.1
        );

    transition:.3s;
}

.input-box input:focus{

    border:
        1px solid
        #38bdf8;

    box-shadow:
        0 0 20px
        rgba(56,189,248,.3);
}

.input-box input::placeholder{
    color:#94a3b8;
}

.camera-box{

    position:relative;

    width:100%;
    max-width:360px;

    margin:20px auto;

    border-radius:30px;

    overflow:hidden;

    border:
        2px solid
        rgba(59,130,246,.7);

    box-shadow:
        0 0 35px
        rgba(59,130,246,.25);
}

video{

    width:100%;

    display:block;

    transform:
        scaleX(-1);
}

.scan-frame{

    position:absolute;

    width:62%;
    height:72%;

    top:14%;
    left:19%;

    border:
        3px solid
        #38bdf8;

    border-radius:24px;

    box-shadow:
        0 0 25px
        rgba(56,189,248,.6);

    animation:
        pulseFrame
        2s infinite;
}

@keyframes pulseFrame{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }
}

.scan-line{

    position:absolute;

    width:62%;
    height:4px;

    left:19%;

    background:
        linear-gradient(
            to right,
            transparent,
            #38bdf8,
            transparent
        );

    box-shadow:
        0 0 15px
        #38bdf8;

    animation:
        scanMove
        2.5s infinite linear;
}

@keyframes scanMove{

    0%{
        top:18%;
    }

    100%{
        top:76%;
    }
}

.capture-btn{

    width:100%;

    padding:18px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:18px;
    font-weight:600;

    color:white;

    background:
        linear-gradient(
            90deg,
            #2563eb,
            #06b6d4
        );

    transition:.3s;
}

.capture-btn:hover{

    transform:
        translateY(-2px);

    box-shadow:
        0 10px 25px
        rgba(37,99,235,.35);
}

.progress{

    margin-top:18px;

    color:#e2e8f0;

    font-size:18px;

    font-weight:600;
}

.success{
    color:#4ade80;
}

.error{
    color:#f87171;
}

</style>
</head>

<body>

<div class="bg-glow one"></div>
<div class="bg-glow two"></div>

<div class="card">

    <h1>
        Face Registration
    </h1>

    <p>
        Enter user details and
        capture 5 face photos
    </p>

    <div class="input-box">

	<input
    		type="text"
    		id="userid"
    		placeholder="Enter User ID"
    		inputmode="numeric"
    		pattern="[0-9]*"
    		oninput="
        		this.value =
        		this.value.replace(
            			/[^0-9]/g,
            			''
        		)
    		"
	>



    </div>

    <div class="input-box">

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

    </div>

    <div class="camera-box">

        <video
            id="video"
            autoplay
            playsinline
        ></video>

        <div class="scan-frame"></div>

        <div class="scan-line"></div>

    </div>

    <button
        class="capture-btn"
        onclick="registerFace()"
    >
        Capture Face
    </button>

    <div
        class="progress"
        id="status"
    >
        Camera Starting...
    </div>

</div>

<canvas
    id="canvas"
    style="display:none;"
></canvas>

<script>

```


const video =
    document.getElementById(
        "video"
    );

const canvas =
    document.getElementById(
        "canvas"
    );

const statusText =
    document.getElementById(
        "status"
    );

navigator
.mediaDevices
.getUserMedia({
    video:true
})
.then(function(stream){

    video.srcObject =
        stream;

    statusText.innerText =
        "Camera Ready";

})
.catch(function(error){

    statusText.innerText =
        "Camera Access Denied";

    statusText.classList
    .add("error");

    console.log(error);
});

async function captureFrame(
    filename
){

    const context =
        canvas.getContext(
            "2d"
        );

    canvas.width =
        video.videoWidth;

    canvas.height =
        video.videoHeight;

    context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    return new Promise(
        function(resolve){

        canvas.toBlob(
            function(blob){

                resolve({
                    blob,
                    filename
                });

            },
            "image/jpeg",
            0.9
        );

    });
}

async function registerFace(){

    const userid =
        document.getElementById(
            "userid"
        ).value.trim();

    const username =
        document.getElementById(
            "username"
        ).value.trim();

    if(
        !userid ||
        !username
    ){

        alert(
            "Enter User ID and Username"
        );

        return;
    }

    const photos = [];

    for(
        let i = 1;
        i <= 5;
        i++
    ){

        statusText.innerText =
            "Capturing Photo "
            + i +
            "/5";

        const frame =
            await captureFrame(
                "face_"
                + i +
                ".jpg"
            );

        photos.push(
            frame
        );

        await new Promise(
            r => setTimeout(
                r,
                500
            )
        );
    }

    statusText.innerText =
        "Registering Face...";

    try{

        const formData =
            new FormData();

        formData.append(
            "clientid",
            CLIENT_ID
        );

        formData.append(
            "userid",
            userid
        );

        formData.append(
            "username",
            username
        );

        photos.forEach(
            function(photo){

            formData.append(
                "photos",
                photo.blob,
                photo.filename
            );

        });

        const response =
            await fetch(
                "/upload-entity",
                {
                    method:"POST",
                    body:formData
                }
            );

        const data =
            await response.json();

        statusText.innerText =
            data.message;

        if(
            data.success
        ){

            statusText.classList
            .add("success");

        }else{

            statusText.classList
            .add("error");
        }

    }catch(error){

        statusText.innerText =
            "Server Error";

        statusText.classList
        .add("error");

        console.log(error);
    }
}

</script>

</body>
</html>
