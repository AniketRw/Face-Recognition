
<!-- welcome.html -->
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
        'Segoe UI',
        sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            135deg,
            #0f172a,
            #111827,
            #172554
        );

    overflow:hidden;
}

.bg-glow{

    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(59,130,246,.25),
            transparent 70%
        );

    filter:blur(50px);

    animation:
        floatGlow
        6s infinite ease-in-out;
}

.bg-glow.one{
    top:-120px;
    left:-120px;
}

.bg-glow.two{
    bottom:-120px;
    right:-120px;
}

@keyframes floatGlow{

    0%,100%{
        transform:
            translateY(0);
    }

    50%{
        transform:
            translateY(-25px);
    }
}

.welcome-card{

    width:520px;

    padding:50px 40px;

    border-radius:34px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:
        blur(22px);

    border:
        1px solid rgba(
            255,255,255,.15
        );

    box-shadow:
        0 25px 50px
        rgba(0,0,0,.35);

    text-align:center;

    position:relative;
}

.check-circle{

    width:120px;
    height:120px;

    margin:auto;
    margin-bottom:28px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            135deg,
            #10b981,
            #22c55e
        );

    box-shadow:
        0 0 35px
        rgba(34,197,94,.35);

    animation:
        pulseGlow
        2s infinite;
}

@keyframes pulseGlow{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }
}

.check-icon{

    font-size:58px;
    color:white;
}

.welcome-title{

    color:white;

    font-size:42px;

    margin-bottom:10px;
}

.subtitle{

    color:#94a3b8;

    font-size:18px;

    margin-bottom:35px;
}

.user-card{

    background:
        rgba(255,255,255,.06);

    border:
        1px solid rgba(
            255,255,255,.08
        );

    border-radius:24px;

    padding:24px;

    margin-bottom:28px;
}

.user-label{

    color:#64748b;

    font-size:14px;

    margin-bottom:6px;

    text-transform:uppercase;
}

.user-value{

    color:white;

    font-size:28px;
    font-weight:600;

    margin-bottom:16px;
}

.logout-btn{

    width:100%;

    padding:18px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:18px;
    font-weight:600;

    color:white;

    background:
        linear-gradient(
            90deg,
            #2563eb,
            #06b6d4
        );

    transition:.3s;
}

.logout-btn:hover{

    transform:
        translateY(-2px);

    box-shadow:
        0 10px 25px
        rgba(37,99,235,.35);
}

</style>
</head>

<body>

<div class="bg-glow one"></div>
<div class="bg-glow two"></div>

<div class="welcome-card">

    <div class="check-circle">

        <div class="check-icon">
            ✓
        </div>

    </div>

    <h1 class="welcome-title">
        Welcome
    </h1>

    <p class="subtitle">
        Face authentication
        completed successfully
    </p>

    <div class="user-card">

        <div class="user-label">
            Username
        </div>

        <div
            class="user-value"
            id="username"
        ></div>

        <div class="user-label">
            User ID
        </div>

        <div
            class="user-value"
            id="userid"
        ></div>

    </div>

    <button
        class="logout-btn"
        onclick="logout()"
    >
        Logout
    </button>

</div>

<script>

const username =
    localStorage.getItem(
        "loggedInUser"
    );

const userid =
    localStorage.getItem(
        "loggedInUserId"
    );

if(!username){

    window.location.href =
        "login.html";
}

document.getElementById(
    "username"
).innerText =
    username || "Unknown";

document.getElementById(
    "userid"
).innerText =
    userid || "-";

function logout(){

    localStorage.clear();

    window.location.href =
        "login.html";
}

</script>

</body>
</html>
